name: Tessl Skill Review

on:
  push:
    branches: [main]
  # pull_request_target (instead of pull_request) so the review job can access
  # TESSL_TOKEN on PRs from forks; secrets are never exposed to plain
  # `pull_request` fork runs. Fork runs are gated by the `eval` environment below.
  pull_request_target:
    branches: [main]

permissions:
  contents: read

jobs:
  tessl-review:
    runs-on: ubuntu-latest
    # Gate only PRs from forks behind the `eval` environment's required reviewers,
    # so a maintainer approves before TESSL_TOKEN reaches untrusted PR content.
    # Same-repo PRs (maintainers / anyone with write access push branches here)
    # and push-to-main get an empty environment => no approval, run unattended.
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'eval' || '' }}
    steps:
      # Fork PRs: review the merged result via the PR merge ref.
      # Push to main: use the pushed commit.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request_target' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.sha }}
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Detect changed skills
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            # base.sha/head.sha are hex SHAs (safe to interpolate) and both reachable
            # from the merge commit, so this diff is exactly the PR's changes.
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

            # Build list of all skill directories (parents of SKILL.md)
            ALL_SKILL_DIRS=$(find plugins -name SKILL.md -exec dirname {} \; | sort)

            # For each changed file, find which skill directory it belongs to
            DIRS=""
            for changed_file in $CHANGED_FILES; do
              for skill_dir in $ALL_SKILL_DIRS; do
                case "$changed_file" in
                  "$skill_dir"/*)
                    # Check not already added
                    case " $DIRS " in
                      *" $skill_dir "*) ;;
                      *) DIRS="$DIRS $skill_dir" ;;
                    esac
                    break
                    ;;
                esac
              done
            done

            DIRS=$(echo "$DIRS" | xargs)  # trim whitespace

            if [ -z "$DIRS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No skill files changed."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
              echo "Changed skills: $DIRS"
            fi
          else
            # Push to main: only review skills changed in this push
            CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD)

            ALL_SKILL_DIRS=$(find plugins -name SKILL.md -exec dirname {} \; | sort)

            DIRS=""
            for changed_file in $CHANGED_FILES; do
              for skill_dir in $ALL_SKILL_DIRS; do
                case "$changed_file" in
                  "$skill_dir"/*)
                    case " $DIRS " in
                      *" $skill_dir "*) ;;
                      *) DIRS="$DIRS $skill_dir" ;;
                    esac
                    break
                    ;;
                esac
              done
            done

            DIRS=$(echo "$DIRS" | xargs)

            if [ -z "$DIRS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "Push to main — no skill files changed."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
              echo "Push to main — changed skills: $DIRS"
            fi
          fi

      - name: Post skip summary
        if: steps.detect.outputs.skip == 'true'
        run: |
          echo "## Skill Review" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No skills changed — review skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Review skills
        if: steps.detect.outputs.skip != 'true'
        run: |
          THRESHOLD=80
          # Tessl workspace to attribute review runs to (required when --json is set).
          # Derived from the registry namespace used by this repo's plugins (e.g. .tessl-plugin/plugin.json "name": "adobe/...").
          WORKSPACE=adobe
          PASS=0
          FAIL=0
          SUMMARY_FILE=$(mktemp)
          ERRORS_FILE=$(mktemp)

          SKILL_DIRS_INPUT="${{ steps.detect.outputs.dirs }}"
          SKILL_LIST_FILE=$(mktemp)
          trap 'rm -f "$SKILL_LIST_FILE" "$SUMMARY_FILE" "$ERRORS_FILE"' EXIT

          if [ -z "$SKILL_DIRS_INPUT" ]; then
            # Push to main or no filter: review all skills
            find plugins -name SKILL.md -exec dirname {} \; > "$SKILL_LIST_FILE"
          else
            # PR mode: use detected skill dirs
            printf '%s\n' $SKILL_DIRS_INPUT > "$SKILL_LIST_FILE"
          fi

          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            SKILL_NAME=$(basename "$dir")
            echo "::group::Reviewing $SKILL_NAME"

            EXIT_CODE=0
            OUTPUT=$(tessl review run "$dir" --workspace "$WORKSPACE" --json --threshold "$THRESHOLD" 2>&1) || EXIT_CODE=$?
            echo "$OUTPUT"
            echo "::endgroup::"

            # Parse the overall score from the --json payload; fall back to any percentage in the output.
            SCORE=$(printf '%s' "$OUTPUT" | grep -oiE '"(overall[_]?score|review[_]?score)"[[:space:]]*:[[:space:]]*[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            [ -z "$SCORE" ] && SCORE=$(printf '%s' "$OUTPUT" | grep -oiE '"score"[[:space:]]*:[[:space:]]*[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
            [ -z "$SCORE" ] && SCORE=$(printf '%s' "$OUTPUT" | grep -oE '[0-9]+%' | tail -1 | tr -d '%' || true)

            if [ "$EXIT_CODE" -eq 0 ]; then
              # Review met the threshold — gating is done by the CLI exit code.
              PASS=$((PASS + 1))
              echo "| $SKILL_NAME | ${SCORE:-?}% | ✅ |" >> "$SUMMARY_FILE"
            elif [ -n "$SCORE" ]; then
              # Non-zero exit with a parseable score = below-threshold failure.
              FAIL=$((FAIL + 1))
              echo "  ❌ $SKILL_NAME: ${SCORE}% (below ${THRESHOLD}%)" >> "$ERRORS_FILE"
              echo "| $SKILL_NAME | ${SCORE}% | ❌ |" >> "$SUMMARY_FILE"
            else
              # Non-zero exit with no parseable score = tool/auth error.
              echo "::warning::tessl review run failed for $SKILL_NAME (exit code $EXIT_CODE)"
              FAIL=$((FAIL + 1))
              echo "| $SKILL_NAME | error | ❌ |" >> "$SUMMARY_FILE"
            fi
          done < "$SKILL_LIST_FILE"

          TOTAL=$((PASS + FAIL))

          # Fail if no skills were reviewed but some were expected
          if [ "$TOTAL" -eq 0 ] && [ -n "$SKILL_DIRS_INPUT" ]; then
            echo "::error::No skills were reviewed — expected at least one"
            exit 1
          fi

          # Write GitHub Step Summary
          {
            echo "## Skill Review"
            echo ""
            echo "| Skill | Score | Status |"
            echo "|-------|-------|--------|"
            cat "$SUMMARY_FILE"
            echo "| **Total** | **$PASS/$TOTAL passed** | $([ "$FAIL" -eq 0 ] && echo '✅' || echo '❌') |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Stdout summary for logs
          echo ""
          echo "============================="
          echo "  Skill Review Summary"
          echo "============================="
          echo "  Total:  $TOTAL"
          echo "  Passed: $PASS"
          echo "  Failed: $FAIL"
          if [ -s "$ERRORS_FILE" ]; then
            echo ""
            echo "  Failed skills:"
            cat "$ERRORS_FILE"
          fi
          echo "============================="

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL skill(s) scored below ${THRESHOLD}%"
            exit 1
          fi

